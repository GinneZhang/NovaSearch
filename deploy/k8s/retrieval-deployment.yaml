apiVersion: apps/v1
kind: Deployment
metadata:
  name: asterscope-retrieval
  labels:
    app: asterscope
    component: retrieval
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asterscope
      component: retrieval
  template:
    metadata:
      labels:
        app: asterscope
        component: retrieval
    spec:
      containers:
        - name: retrieval
          image: asterscope/retrieval:latest
          ports:
            - containerPort: 8001
          envFrom:
            - secretRef:
                name: asterscope-secrets
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import psycopg2, redis, os
                  # Check PostgreSQL
                  psycopg2.connect(
                      host=os.getenv('POSTGRES_HOST'),
                      port=os.getenv('POSTGRES_PORT', '5432'),
                      dbname=os.getenv('POSTGRES_DB'),
                      user=os.getenv('POSTGRES_USER'),
                      password=os.getenv('POSTGRES_PASSWORD')
                  ).close()
                  # Check Redis
                  redis.Redis(
                      host=os.getenv('REDIS_HOST', 'localhost'),
                      port=int(os.getenv('REDIS_PORT', '6379'))
                  ).ping()
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import psycopg2, redis, os
                  psycopg2.connect(
                      host=os.getenv('POSTGRES_HOST'),
                      port=os.getenv('POSTGRES_PORT', '5432'),
                      dbname=os.getenv('POSTGRES_DB'),
                      user=os.getenv('POSTGRES_USER'),
                      password=os.getenv('POSTGRES_PASSWORD')
                  ).close()
                  redis.Redis(
                      host=os.getenv('REDIS_HOST', 'localhost'),
                      port=int(os.getenv('REDIS_PORT', '6379'))
                  ).ping()
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: asterscope-retrieval
  labels:
    app: asterscope
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
  selector:
    app: asterscope
    component: retrieval
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asterscope-retrieval-hpa
  labels:
    app: asterscope
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asterscope-retrieval
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
