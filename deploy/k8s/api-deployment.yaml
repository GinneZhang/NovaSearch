apiVersion: apps/v1
kind: Deployment
metadata:
  name: asterscope-api
  labels:
    app: asterscope
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asterscope
      component: api
  template:
    metadata:
      labels:
        app: asterscope
        component: api
    spec:
      containers:
        - name: api
          image: asterscope/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: asterscope-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: asterscope-api
  labels:
    app: asterscope
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: asterscope
    component: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asterscope-api-hpa
  labels:
    app: asterscope
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asterscope-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
