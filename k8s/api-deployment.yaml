apiVersion: apps/v1
kind: Deployment
metadata:
  name: asterscope-api
  labels:
    app: asterscope
spec:
  replicas: 3
  selector:
    matchLabels:
      app: asterscope-api
  template:
    metadata:
      labels:
        app: asterscope-api
    spec:
      containers:
      - name: fastapi
        image: asterscope-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: asterscope-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: asterscope-api-svc
spec:
  selector:
    app: asterscope-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
