apiVersion: apps/v1
kind: Deployment
metadata:
  name: asterscope-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2.3-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--requirepass", "redis_password"] # To be replaced by configuration or secrets
---
apiVersion: v1
kind: Service
metadata:
  name: asterscope-redis-svc
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
